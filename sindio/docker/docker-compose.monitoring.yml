# Sindio — Prometheus + Grafana Monitoring Stack
# Added to docker-compose for local development observability.
# Must be merged with docker-compose.yml (which defines sindio_net):
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.monitoring.yml up -d

services:
  # ── Prometheus ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: sindio-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - sindio_net

  # ── Grafana ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.1
    container_name: sindio-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-sindio_admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3001"
    volumes:
      - grafanadata:/var/lib/grafana
      - ../monitoring:/etc/grafana/provisioning/dashboards:ro
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - prometheus
    networks:
      - sindio_net

  # ── Loki (log aggregation) ──────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    container_name: sindio-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml:ro
      - lokidata:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - sindio_net

  # ── Promtail (log shipper) ─────────────────────────────
  promtail:
    image: grafana/promtail:2.9.0
    container_name: sindio-promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - sindio_net

volumes:
  prometheusdata:
    name: sindio_prometheus_data
  grafanadata:
    name: sindio_grafana_data
  lokidata:
    name: sindio_loki_data
