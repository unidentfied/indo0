# Nginx config for Sindio single-page application
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Health endpoint
    location = /health {
        access_log off;
        return 200 "OK";
    }

    # API proxy (handled at K8s ingress level in production)
    location /api/ {
        proxy_pass http://sindio-api.sindio.svc.cluster.local:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # Static assets (long cache)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
