services:
  # ============================================================
  # PostgreSQL 16 + PostGIS + TimescaleDB
  # ============================================================
  postgres:
    user: ${NON_ROOT_UID:-1000}
    build:
      context: ./postgres
      dockerfile: Dockerfile
    env_file:
      - ../.env
    restart: unless-stopped
    # ports intentionally omitted — internal Docker network only in production
    environment:
      POSTGRES_USER: ${DB_USER:-sindio_user}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: ${DB_NAME:-sindio}
    secrets:
      - db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-sindio_user} -d ${DB_NAME:-sindio}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sindio_net

  # ============================================================
  # Qdrant — Vector Database (RAG embeddings)
  # ============================================================
  qdrant:
    image: qdrant/qdrant:v1.12.0
    env_file:
      - ../.env
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: [ "CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sindio_net

  # ============================================================
  # Redis — Celery broker + caching layer
  # ============================================================
  redis:
    env_file:
      - ../.env
    image: redis:7-alpine
    user: ${NON_ROOT_UID:-1000}
    container_name: redis
    restart: unless-stopped
    # ports intentionally omitted — internal Docker network only in production
    command: >
      redis-server
        --appendonly yes
        --requirepass ${REDIS_PASSWORD:-sindio_redis_local}
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-sindio_redis_local}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - sindio_net

  # ============================================================
  core:
    build:
      context: ..
      dockerfile: backend/core/Dockerfile.core
    container_name: core
    restart: unless-stopped
    ports:
      - "8081:8081"
    env_file:
      - ../.env
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: us-east-1
      DB_HOST: postgres
      REDIS_HOST: redis
      QDRANT_HOST: qdrant
      ELASTICSEARCH_HOST: http://elasticsearch:9200
      MINIO_HOST: minio
      AWS_ENDPOINT_URL: http://localstack:4566
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sindio_net

  celery_worker:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    container_name: celery-worker
    restart: unless-stopped
    command: [ "celery", "-A", "app.worker.celery_app", "worker", "--loglevel=info" ]
    env_file:
      - ../.env
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      DB_HOST: postgres
      REDIS_HOST: redis
      QDRANT_HOST: qdrant
      ELASTICSEARCH_HOST: http://elasticsearch:9200
      MINIO_HOST: minio
      AWS_ENDPOINT_URL: http://localstack:4566
    depends_on:
      - postgres
      - redis
    networks:
      - sindio_net

  celery_beat:
    build:
      context: ../..
      dockerfile: backend/core/Dockerfile.core
    container_name: sindio-celery-beat
    restart: unless-stopped
    command: [ "celery", "-A", "app.worker.celery_app", "beat", "--loglevel=info" ]
    env_file:
      - ../.env
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      DB_HOST: postgres
      REDIS_HOST: redis
      QDRANT_HOST: qdrant
      ELASTICSEARCH_HOST: http://elasticsearch:9200
      MINIO_HOST: minio
      AWS_ENDPOINT_URL: http://localstack:4566
    depends_on:
      - postgres
      - redis
    networks:
      - sindio_net
  # ============================================================
  # MinIO — S3-compatible satellite / raster imagery storage
  # ============================================================
  minio:
    image: minio/minio:RELEASE.2024-03-21T23-13-43Z
    user: ${NON_ROOT_UID:-1000}
    container_name: sindio-minio
    env_file:
      - ../.env
    restart: unless-stopped
    command: server /data --console-address ":9001"
    volumes:
      - ./docker/certs:/certs:ro
      - miniodata:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
      MINIO_DEFAULT_BUCKETS: sindio-satellite-imagery,sindio-gis-rasters
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:9000/minio/health/live > /dev/null || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sindio_net

  # Auto-create default buckets on startup
  minio-init:
    restart: unless-stopped
    image: minio/mc:RELEASE.2024-11-07T00-52-20Z
    env_file:
      - ../.env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " mc alias set local http://minio:9000 minioadmin $${MINIO_PASSWORD}; mc mb --ignore-existing local/sindio-satellite-imagery; mc mb --ignore-existing local/sindio-gis-rasters; mc anonymous set download local/sindio-gis-rasters; echo 'MinIO buckets created.'; exit 0 "
    networks:
      - sindio_net

  # ============================================================
  # Frontend UI – Vite built image
  # ============================================================
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: sindio-frontend:latest
    container_name: sindio-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - core
    networks:
      - sindio_net

  # ============================================================
  # Streaming — Rust Axum HTTP server (sensor ingest)
  # ============================================================
  streaming:
    build:
      context: ..
      dockerfile: docker/Dockerfile.rust
    container_name: sindio-streaming
    restart: unless-stopped
    ports:
      - "8082:8082"
    env_file:
      - ../.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      STREAMING_PORT: "8082"
      RUST_LOG: sindio_streaming=info,tower_http=debug
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - sindio_net

  # ============================================================
  # PGAdmin 4 — PostgreSQL web-based admin console
  # ============================================================
  pgadmin:
    image: dpage/pgadmin4:8.6
    container_name: sindio-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    env_file:
      - ../.env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@sindio.urban}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmindata:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:80/misc/ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - sindio_net

  # ============================================================
  # LocalStack — Mock AWS SQS for real-time mobility streams
  # ============================================================
  localstack:
    image: localstack/localstack:3.4.0
    container_name: sindio-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      SERVICES: sqs,sns
      AWS_DEFAULT_REGION: us-east-1
      EDGE_PORT: 4566
      PERSISTENCE: 1
      DOCKER_HOST: unix:///var/run/docker.sock
      LS_LOG: WARN
    volumes:
      - localstackdata:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - sindio_net

  # Auto-create SQS queues on startup
  localstack-init:
    restart: unless-stopped
    image: amazon/aws-cli:2.22.0
    container_name: sindio-localstack-init
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      /bin/sh -c " aws --endpoint-url=http://localstack:4566 sqs create-queue --queue-name sindio-mobility-stream; aws --endpoint-url=http://localstack:4566 sqs create-queue --queue-name sindio-utility-telemetry; aws --endpoint-url=http://localstack:4566 sqs create-queue --queue-name sindio-sensor-ingest-dlq; aws --endpoint-url=http://localstack:4566 sns create-topic --name sindio-system-alerts; echo 'LocalStack queues created.'; exit 0 "
    networks:
      - sindio_net

  # ============================================================
  # Elasticsearch — Hybrid text search for alerts
  # ============================================================
  elasticsearch:
    env_file:
      - ../.env
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: sindio-elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "${ELASTICSEARCH_SECURITY:-true}"
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - sindio_net

  # ============================================================
  # Kafka — Event streaming for mobility consumer (KRaft, no ZK)
  # ============================================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0 #
    container_name: sindio-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

    volumes:
      - kafkadata:/bitnami/kafka
    networks:
      - sindio_net
  # ============================================================
  # Persistent Volumes
  # ============================================================
volumes:
  pgdata:
    name: sindio_postgres_data
    driver: local
  qdrantdata:
    name: sindio_qdrant_data
    driver: local
  redisdata:
    name: sindio_redis_data
    driver: local
  miniodata:
    name: sindio_minio_data
    driver: local
  pgadmindata:
    name: sindio_pgadmin_data
    driver: local
  localstackdata:
    name: sindio_localstack_data
    driver: local
  esdata:
    name: sindio_es_data
    driver: local
  kafkadata:
    name: sindio_kafka_data
    driver: local

# ============================================================
# Shared Network
# ============================================================
networks:
  sindio_net:
    name: sindio_net
    driver: bridge

secrets:
  db_password:
    environment: "DB_PASSWORD"
