version: "3.9"

services:
  # ============================================================
  # PostgreSQL 16 + PostGIS + TimescaleDB
  # ============================================================
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    container_name: sindio-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-sindio_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sindio_pass}
      POSTGRES_DB: ${DB_NAME:-sindio}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sindio_user} -d ${DB_NAME:-sindio}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sindio_net

  # ============================================================
  # Qdrant — Vector Database (RAG embeddings)
  # ============================================================
  qdrant:
    image: qdrant/qdrant:v1.9.4
    container_name: sindio-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sindio_net

  # ============================================================
  # Redis — Celery broker + caching layer
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: sindio-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
        --appendonly yes
        --requirepass ${REDIS_PASSWORD:-}
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - sindio_net

  # ============================================================
  # MinIO — S3-compatible satellite / raster imagery storage
  # ============================================================
  minio:
    image: minio/minio:RELEASE.2024-03-21T23-13-43Z
    container_name: sindio-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
      MINIO_DEFAULT_BUCKETS: sindio-satellite-imagery,sindio-gis-rasters
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sindio_net

  # Auto-create default buckets on startup
  minio-init:
    image: minio/mc:latest
    container_name: sindio-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_USER:-minioadmin} ${MINIO_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/sindio-satellite-imagery;
      mc mb --ignore-existing local/sindio-gis-rasters;
      mc anonymous set download local/sindio-gis-rasters;
      echo 'MinIO buckets created.';
      exit 0
      "
    networks:
      - sindio_net

  # ============================================================
  # PGAdmin 4 — PostgreSQL web-based admin console
  # ============================================================
  pgadmin:
    image: dpage/pgadmin4:8.6
    container_name: sindio-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@sindio.urban}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-sindio_admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmindata:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/misc/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - sindio_net

  # ============================================================
  # LocalStack — Mock AWS SQS for real-time mobility streams
  # ============================================================
  localstack:
    image: localstack/localstack:3.4.0
    container_name: sindio-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      SERVICES: sqs,sns
      AWS_DEFAULT_REGION: us-east-1
      EDGE_PORT: 4566
      PERSISTENCE: 1
      DOCKER_HOST: unix:///var/run/docker.sock
      LS_LOG: WARN
    volumes:
      - localstackdata:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - sindio_net

  # Auto-create SQS queues on startup
  localstack-init:
    image: amazon/aws-cli:latest
    container_name: sindio-localstack-init
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
      aws --endpoint-url=http://localstack:4566 sqs create-queue --queue-name sindio-mobility-stream;
      aws --endpoint-url=http://localstack:4566 sqs create-queue --queue-name sindio-utility-telemetry;
      aws --endpoint-url=http://localstack:4566 sqs create-queue --queue-name sindio-sensor-ingest-dlq;
      aws --endpoint-url=http://localstack:4566 sns create-topic --name sindio-system-alerts;
      echo 'LocalStack queues created.';
      exit 0
      "
    networks:
      - sindio_net

  # ============================================================
  # Elasticsearch — Hybrid text search for alerts
  # ============================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: sindio-elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - sindio_net

  # ============================================================
# Persistent Volumes
# ============================================================
volumes:
  pgdata:
    name: sindio_postgres_data
    driver: local
  qdrantdata:
    name: sindio_qdrant_data
    driver: local
  redisdata:
    name: sindio_redis_data
    driver: local
  miniodata:
    name: sindio_minio_data
    driver: local
  pgadmindata:
    name: sindio_pgadmin_data
    driver: local
  localstackdata:
    name: sindio_localstack_data
    driver: local
  esdata:
    name: sindio_es_data
    driver: local

# ============================================================
# Shared Network
# ============================================================
networks:
  sindio_net:
    name: sindio_net
    driver: bridge
