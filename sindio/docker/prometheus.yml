global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'sindio-mock-api'
    static_configs:
      - targets: ['sindio-api:8080']
    metrics_path: /metrics

  - job_name: 'sindio-core'
    static_configs:
      - targets: ['sindio-core:8081']
    metrics_path: /metrics

  - job_name: 'sindio-streaming'
    static_configs:
      - targets: ['sindio-streaming:8082']
    metrics_path: /metrics

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
