name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Secret Scanning (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build core image
        run: |
          docker compose -f docker/docker-compose.yml build core

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm ci
      - name: Lint frontend
        working-directory: frontend
        run: |
          npm run lint
      - name: Build UI Docker image
        run: |
          docker compose -f docker/docker-compose.yml build frontend
      - name: Push UI image to GHCR
        env:
          IMAGE_TAG: ghcr.io/${{ github.repository_owner }}/sindio-frontend:latest
        run: |
          docker tag sindio-frontend:latest $IMAGE_TAG
          docker push $IMAGE_TAG
      - name: Cache Poetry packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-


      - name: Lint core package
        working-directory: backend/core
        run: |
          ruff .

      - name: Run tests
        working-directory: backend/core
        run: |
          pytest

      - name: Push core image to GHCR
        env:
          IMAGE_TAG: ghcr.io/${{ github.repository_owner }}/sindio-core:latest
        run: |
          docker tag sindio-core:latest $IMAGE_TAG
          docker push $IMAGE_TAG

      - name: Run Trivy vulnerability scanner on core image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/sindio-core:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
