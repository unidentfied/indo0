name: Build & Push Real ML Images to ECR

# ============================================================
# Builds the real sindio-rag and sindio-simulator images
# (backend/core/app/ code, no torch/transformers — ML inference
#  degrades to heuristics). Pushes to ECR with immutable tags.
#
# Trigger: manual workflow_dispatch, or on push to main
# that touches backend/core/, docker/build/Dockerfile.core-slim,
# or this workflow.
# ============================================================

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (e.g., v1.0.7)'
        required: true
        default: 'v1.0.7'
  push:
    branches: [main]
    paths:
      - 'backend/core/**'
      - 'docker/build/Dockerfile.core-slim'
      - '.github/workflows/build-ecr-images.yml'
      - '.dockerignore'

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 429429083547.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_TAG: ${{ github.event.inputs.image_tag || 'v1.0.7' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: rag
            image: sindio-rag
          - name: simulator
            image: sindio-simulator

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/pipx /opt/hostedtoolcache
          df -h

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: 'true'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/build/Dockerfile.core-slim
          push: ${{ github.event_name == 'workflow_dispatch' }}
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=${{ matrix.image }}-slim
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-slim
          platforms: linux/amd64
          provenance: false

      - name: Verify image in ECR
        if: success()
        run: |
          aws ecr describe-images \
            --repository-name ${{ matrix.image }} \
            --image-ids imageTag=${{ env.IMAGE_TAG }} \
            --region ${{ env.AWS_REGION }}

      - name: Output image URI
        run: echo "Built: ${{ env.ECR_REGISTRY }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}"
