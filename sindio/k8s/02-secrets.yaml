# ============================================================
# Sindio — ExternalSecrets (ESO) fetching secrets from AWS Secrets Manager
# ============================================================
#
# Requires External Secrets Operator installed in the cluster:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets
#
# Assumes a secret at AWS Secrets Manager path:  /sindio/production
# with JSON keys matching the spec below.  Swap storeRef for GCP / Vault as needed.
# ---------------------------------------------------------------------------

# --- SecretStore (cluster-wide) ---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: sindio-aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-credentials
            namespace: kube-system
            key: access-key-id
          secretAccessKeySecretRef:
            name: aws-credentials
            namespace: kube-system
            key: secret-access-key
---
# --- ExternalSecret: maps AWS Secrets Manager JSON keys → K8s Secret ---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sindio-secrets
  namespace: sindio
  labels:
    app.kubernetes.io/name: sindio
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: sindio-aws-secretsmanager
  target:
    name: sindio-secrets
    creationPolicy: Owner
  data:
    # Database credentials
    - secretKey: DB_PASSWORD
      remoteRef:
        key: /sindio/production
        property: db_password
    # Redis
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: /sindio/production
        property: redis_password
    # MinIO
    - secretKey: MINIO_USER
      remoteRef:
        key: /sindio/production
        property: minio_user
    - secretKey: MINIO_PASSWORD
      remoteRef:
        key: /sindio/production
        property: minio_password
    # Qdrant
    - secretKey: QDRANT_API_KEY
      remoteRef:
        key: /sindio/production
        property: qdrant_api_key
    # External API keys
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: /sindio/production
        property: openai_api_key
    - secretKey: MAPBOX_ACCESS_TOKEN
      remoteRef:
        key: /sindio/production
        property: mapbox_access_token
    - secretKey: HUGGINGFACE_HUB_TOKEN
      remoteRef:
        key: /sindio/production
        property: huggingface_hub_token
    # Auth
    - secretKey: JWT_SECRET
      remoteRef:
        key: /sindio/production
        property: jwt_secret
    - secretKey: AUTH_USERNAME
      remoteRef:
        key: /sindio/production
        property: auth_username
    - secretKey: AUTH_PASSWORD
      remoteRef:
        key: /sindio/production
        property: auth_password
    # Elasticsearch
    - secretKey: ELASTIC_PASSWORD
      remoteRef:
        key: /sindio/production
        property: elastic_password
    # SerpAPI
    - secretKey: SERPAPI_API_KEY
      remoteRef:
        key: /sindio/production
        property: serpapi_api_key
    # PGAdmin (if deployed)
    - secretKey: PGADMIN_EMAIL
      remoteRef:
        key: /sindio/production
        property: pgadmin_email
    - secretKey: PGADMIN_PASSWORD
      remoteRef:
        key: /sindio/production
        property: pgadmin_password
