apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sindio-staging

resources:
  - ../../base

replicas:
  - name: sindio-api
    count: 1
  - name: sindio-frontend
    count: 1
  - name: sindio-simulator
    count: 1
  - name: sindio-rag
    count: 1

patches:
  - target:
      kind: Deployment
      name: sindio-api
      namespace: sindio
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "250m"

  - patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: sindio-config
        namespace: sindio
      data:
        LOG_LEVEL: "debug"
        CORS_ORIGINS: "http://localhost:3000,https://staging.sindio.net"
