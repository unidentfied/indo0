apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sindio-staging

resources:
  - ../../

namePrefix: staging-

replicas:
  - name: sindio-api
    count: 1
  - name: sindio-frontend
    count: 1
  - name: sindio-simulator
    count: 1
  - name: sindio-rag
    count: 1

configMapGenerator:
  - name: sindio-config
    behavior: merge
    literals:
      - LOG_LEVEL=debug
      - CORS_ORIGINS=http://localhost:3000,https://staging.sindio.net

patches:
  - target:
      kind: Deployment
      name: sindio-api
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "250m"
