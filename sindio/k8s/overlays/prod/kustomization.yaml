# ============================================================
# Sindio — Kustomize overlay: prod
# ============================================================
# Optimized for 4-node t3.micro EKS cluster (16 pod slots, 540Mi/node).
# Postgres + Redis + Minio in-cluster with emptyDir (ephemeral).
# Uses RDS for prod DB; in-cluster postgres for dev/testing.
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sindio

resources:
  - ../../base

images:
  - name: ghcr.io/sindio/sindio-api
    newName: 429429083547.dkr.ecr.us-east-1.amazonaws.com/sindio-api
    newTag: v1.0.2
  - name: ghcr.io/sindio/sindio-simulator
    newName: 429429083547.dkr.ecr.us-east-1.amazonaws.com/sindio-simulator
    newTag: v1.0.4
  - name: ghcr.io/sindio/sindio-rag
    newName: 429429083547.dkr.ecr.us-east-1.amazonaws.com/sindio-rag
    newTag: v1.0.4
  - name: ghcr.io/sindio/sindio-frontend
    newName: 429429083547.dkr.ecr.us-east-1.amazonaws.com/sindio-frontend
    newTag: v1.0.3

patches:
  # ═══════════════════════════════════════════════════════════════
  # Replicas
  # ═══════════════════════════════════════════════════════════════
  - target:
      kind: Deployment
      name: sindio-api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: sindio-frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: sindio-simulator
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: sindio-rag
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: sindio-redis
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: sindio-postgres
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: sindio-minio
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

  - target:
      kind: Deployment
      name: sindio-celery-beat
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 0
  - target:
      kind: Deployment
      name: sindio-qdrant
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 0

  # ═══════════════════════════════════════════════════════════════
  # Simulator: real image → uvicorn app.main:app
  # ═══════════════════════════════════════════════════════════════
  - target:
      kind: Deployment
      name: sindio-simulator
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/command
        value: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8081"]
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe
        value:
          httpGet:
            path: /health/ready
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe
        value:
          httpGet:
            path: /health/ready
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
      - op: remove
        path: /spec/template/spec/containers/0/volumeMounts
      - op: remove
        path: /spec/template/spec/volumes
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"

  # ═══════════════════════════════════════════════════════════════
  # RAG: real image → Dockerfile CMD (app.main:app)
  # ═══════════════════════════════════════════════════════════════
  - target:
      kind: Deployment
      name: sindio-rag
    patch: |-
      - op: remove
        path: /spec/template/spec/containers/0/volumeMounts
      - op: remove
        path: /spec/template/spec/volumes
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/httpGet/path
        value: "/health/ready"
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/httpGet/path
        value: "/health/ready"
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/initialDelaySeconds
        value: 15

  # ═══════════════════════════════════════════════════════════════
  # Redis: emptyDir instead of PVC
  # ═══════════════════════════════════════════════════════════════
  - target:
      kind: Deployment
      name: sindio-redis
    patch: |-
      - op: replace
        path: /spec/template/spec/volumes/0
        value:
          name: redisdata
          emptyDir: {}
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "128Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "256Mi"

  # ═══════════════════════════════════════════════════════════════
  # Postgres: emptyDir + POSTGRES_PASSWORD from secret
  # ═══════════════════════════════════════════════════════════════
  - target:
      kind: Deployment
      name: sindio-postgres
    patch: |-
      - op: replace
        path: /spec/template/spec/volumes/0
        value:
          name: pgdata
          emptyDir: {}
      - op: remove
        path: /spec/template/spec/containers/0/securityContext
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sindio-secrets
              key: DB_PASSWORD
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"

  # ═══════════════════════════════════════════════════════════════
  # Minio: emptyDir instead of PVC
  # ═══════════════════════════════════════════════════════════════
  - target:
      kind: Deployment
      name: sindio-minio
    patch: |-
      - op: replace
        path: /spec/template/spec/volumes/0
        value:
          name: miniodata
          emptyDir: {}
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"

  # ═══════════════════════════════════════════════════════════════
  # Security hardening
  # ═══════════════════════════════════════════════════════════════
  - target:
      kind: Deployment
      name: sindio-api
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/securityContext
        value:
          runAsNonRoot: true
          runAsUser: 65534
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]

  # ═══════════════════════════════════════════════════════════════
  # Config
  # ═══════════════════════════════════════════════════════════════
  - target:
      kind: ConfigMap
      name: sindio-config
    patch: |-
      - op: replace
        path: /data/LOG_LEVEL
        value: warn
      - op: replace
        path: /data/AWS_ENDPOINT_URL
        value: ""
