# ============================================================
# Sindio — Kustomize overlay: prod
# ============================================================
# Optimized for a 4-node t3.medium EKS cluster.
# Removes dev-only stateful services (postgres, redis, minio, qdrant)
# and scales core services to fit within node capacity.
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sindio

resources:
  - ../../base

# Redirect images from GHCR → ECR
# ECR registry: 429429083547.dkr.ecr.us-east-1.amazonaws.com
images:
  - name: ghcr.io/sindio/sindio-api
    newName: 429429083547.dkr.ecr.us-east-1.amazonaws.com/sindio-api
    newTag: v1.0.2
  - name: ghcr.io/sindio/sindio-simulator
    newName: 429429083547.dkr.ecr.us-east-1.amazonaws.com/sindio-simulator
    newTag: v1.0.3-slim
  - name: ghcr.io/sindio/sindio-rag
    newName: 429429083547.dkr.ecr.us-east-1.amazonaws.com/sindio-rag
    newTag: v1.0.3-slim
  - name: ghcr.io/sindio/sindio-frontend
    newName: 429429083547.dkr.ecr.us-east-1.amazonaws.com/sindio-frontend
    newTag: v1.0.3

patches:
  # Scale all deployments to fit 4-node cluster
  - target:
      kind: Deployment
      name: sindio-api
      namespace: sindio
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: sindio-frontend
      namespace: sindio
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: sindio-simulator
      namespace: sindio
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: sindio-rag
      namespace: sindio
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: sindio-celery-beat
      namespace: sindio
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  # Dev-only stateful services: scale to 0 (use RDS/ElastiCache/S3 in prod)
  - target:
      kind: Deployment
      name: sindio-postgres
      namespace: sindio
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 0
  - target:
      kind: Deployment
      name: sindio-redis
      namespace: sindio
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 0
  - target:
      kind: Deployment
      name: sindio-minio
      namespace: sindio
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 0
  - target:
      kind: Deployment
      name: sindio-qdrant
      namespace: sindio
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 0

  # Slim images: override Celery command → uvicorn (no Redis in prod yet)
  # and remove model PVC mounts (EBS CSI driver not installed)
  - target:
      kind: Deployment
      name: sindio-simulator
      namespace: sindio
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/command
        value: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8081"]
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe
        value:
          httpGet:
            path: /api/v1/health/ready
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe
        value:
          httpGet:
            path: /api/v1/health/ready
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
      - op: remove
        path: /spec/template/spec/containers/0/volumeMounts
      - op: remove
        path: /spec/template/spec/volumes
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
  - target:
      kind: Deployment
      name: sindio-rag
      namespace: sindio
    patch: |-
      - op: remove
        path: /spec/template/spec/containers/0/volumeMounts
      - op: remove
        path: /spec/template/spec/volumes
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/httpGet/path
        value: "/api/v1/health/ready"
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/httpGet/path
        value: "/api/v1/health/ready"
  - target:
      kind: Deployment
      name: sindio-celery-beat
      namespace: sindio
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/command
        value: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8081"]
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "128Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "256Mi"

  # Production security hardening
  - target:
      kind: Deployment
      name: sindio-api
      namespace: sindio
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/securityContext
        value:
          runAsNonRoot: true
          runAsUser: 65534
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
  - target:
      kind: Deployment
      name: sindio-simulator
      namespace: sindio
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/securityContext
        value:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]

  # Remove LocalStack from production
  - target:
      kind: ConfigMap
      name: sindio-config
      namespace: sindio
    patch: |-
      - op: replace
        path: /data/LOG_LEVEL
        value: warn
      - op: replace
        path: /data/AWS_ENDPOINT_URL
        value: ""
