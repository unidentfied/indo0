# ============================================================
# Sindio — Kustomize overlay: prod
# ============================================================
# Optimized for 4-node t3.micro EKS cluster:
#   - 16 pod slots total (4 per node)
#   - 540Mi allocatable memory per node
#   - Stateful services use RDS/ElastiCache; only redis runs in-cluster
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sindio

resources:
  - ../../base

# Redirect images from GHCR → ECR
images:
  - name: ghcr.io/sindio/sindio-api
    newName: 429429083547.dkr.ecr.us-east-1.amazonaws.com/sindio-api
    newTag: v1.0.2
  - name: ghcr.io/sindio/sindio-simulator
    newName: 429429083547.dkr.ecr.us-east-1.amazonaws.com/sindio-simulator
    newTag: v1.0.4-slim
  - name: ghcr.io/sindio/sindio-rag
    newName: 429429083547.dkr.ecr.us-east-1.amazonaws.com/sindio-rag
    newTag: v1.0.4-slim
  - name: ghcr.io/sindio/sindio-frontend
    newName: 429429083547.dkr.ecr.us-east-1.amazonaws.com/sindio-frontend
    newTag: v1.0.3

patches:
  # ═══════════════════════════════════════════════════════════════
  # Replicas
  # ═══════════════════════════════════════════════════════════════
  - target:
      kind: Deployment
      name: sindio-api
    patch: &scale-to-1
      - op: replace
        path: /spec/replicas
        value: 1
  - target: { kind: Deployment, name: sindio-frontend }
    patch: *scale-to-1
  - target: { kind: Deployment, name: sindio-simulator }
    patch: *scale-to-1
  - target: { kind: Deployment, name: sindio-rag }
    patch: *scale-to-1
  - target: { kind: Deployment, name: sindio-redis }
    patch: *scale-to-1

  - target:
      kind: Deployment
      name: sindio-celery-beat
    patch: &scale-to-0
      - op: replace
        path: /spec/replicas
        value: 0
  - target: { kind: Deployment, name: sindio-postgres }
    patch: *scale-to-0
  - target: { kind: Deployment, name: sindio-minio }
    patch: *scale-to-0
  - target: { kind: Deployment, name: sindio-qdrant }
    patch: *scale-to-0

  # ═══════════════════════════════════════════════════════════════
  # Simulator: real slim image → uvicorn app.main:app
  # ═══════════════════════════════════════════════════════════════
  - target:
      kind: Deployment
      name: sindio-simulator
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/command
        value: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8081"]
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe
        value:
          httpGet:
            path: /health/ready
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe
        value:
          httpGet:
            path: /health/ready
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
      - op: remove
        path: /spec/template/spec/containers/0/volumeMounts
      - op: remove
        path: /spec/template/spec/volumes
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"

  # ═══════════════════════════════════════════════════════════════
  # RAG: real slim image → Dockerfile CMD (app.main:app)
  # ═══════════════════════════════════════════════════════════════
  - target:
      kind: Deployment
      name: sindio-rag
    patch: |-
      - op: remove
        path: /spec/template/spec/containers/0/volumeMounts
      - op: remove
        path: /spec/template/spec/volumes
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/httpGet/path
        value: "/health/ready"
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/httpGet/path
        value: "/health/ready"
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/initialDelaySeconds
        value: 15

  # ═══════════════════════════════════════════════════════════════
  # Redis: emptyDir instead of PVC, reduced memory for t3.micro
  # ═══════════════════════════════════════════════════════════════
  - target:
      kind: Deployment
      name: sindio-redis
    patch: |-
      - op: replace
        path: /spec/template/spec/volumes/0
        value:
          name: redisdata
          emptyDir: {}
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "128Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "256Mi"

  # ═══════════════════════════════════════════════════════════════
  # Security hardening
  # ═══════════════════════════════════════════════════════════════
  - target:
      kind: Deployment
      name: sindio-api
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/securityContext
        value:
          runAsNonRoot: true
          runAsUser: 65534
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
  - target:
      kind: Deployment
      name: sindio-simulator
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/securityContext
        value:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]

  # ═══════════════════════════════════════════════════════════════
  # Config
  # ═══════════════════════════════════════════════════════════════
  - target:
      kind: ConfigMap
      name: sindio-config
    patch: |-
      - op: replace
        path: /data/LOG_LEVEL
        value: warn
      - op: replace
        path: /data/AWS_ENDPOINT_URL
        value: ""
