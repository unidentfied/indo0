# ============================================================
# Sindio — Deployments (all services)
# ============================================================

---
# ── sindio-api (Go gateway, 3 replicas) ─────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sindio-api
  namespace: sindio
  labels:
    app.kubernetes.io/name: sindio
    app.kubernetes.io/component: api-gateway
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sindio-api
  template:
    metadata:
      labels:
        app: sindio-api
        app.kubernetes.io/name: sindio
        app.kubernetes.io/component: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: sindio-backend
      containers:
        - name: api
          image: ghcr.io/sindio/sindio-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: sindio-config
            - secretRef:
                name: sindio-secrets
          env:
            - name: API_PORT
              value: "8080"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
# ── sindio-simulator (Python — simulation worker, queue-driven) ─
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sindio-simulator
  namespace: sindio
  labels:
    app.kubernetes.io/name: sindio
    app.kubernetes.io/component: simulator
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sindio-simulator
  template:
    metadata:
      labels:
        app: sindio-simulator
        app.kubernetes.io/name: sindio
        app.kubernetes.io/component: simulator
        version: stable
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 300
      serviceAccountName: sindio-backend
      containers:
        - name: simulator
          image: ghcr.io/sindio/sindio-simulator:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - app.services.inference_queue
            - worker
            - --concurrency=2
            - --loglevel=info
            - --max-tasks-per-child=10
            - --time-limit=600
            - -Q
            - sindio_simulator
          envFrom:
            - configMapRef:
                name: sindio-config
            - secretRef:
                name: sindio-secrets
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          volumeMounts:
            - name: models
              mountPath: /app/models
              readOnly: true
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - app.services.inference_queue
                - inspect
                - ping
                - -d
                - celery@$(hostname)
            initialDelaySeconds: 120
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: sindio-models
            readOnly: true
---
# ── sindio-rag (Python — hybrid search + agentic workflow) ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sindio-rag
  namespace: sindio
  labels:
    app.kubernetes.io/name: sindio
    app.kubernetes.io/component: rag
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sindio-rag
  template:
    metadata:
      labels:
        app: sindio-rag
        app.kubernetes.io/name: sindio
        app.kubernetes.io/component: rag
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 120
      serviceAccountName: sindio-backend
      containers:
        - name: rag
          image: ghcr.io/sindio/sindio-rag:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          envFrom:
            - configMapRef:
                name: sindio-config
            - secretRef:
                name: sindio-secrets
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
          volumeMounts:
            - name: models
              mountPath: /app/models
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: sindio-models
            readOnly: true
---
# ── sindio-frontend (Nginx + React, 2 replicas) ─────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sindio-frontend
  namespace: sindio
  labels:
    app.kubernetes.io/name: sindio
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sindio-frontend
  template:
    metadata:
      labels:
        app: sindio-frontend
        app.kubernetes.io/name: sindio
        app.kubernetes.io/component: frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9113"
    spec:
      serviceAccountName: sindio-backend
      containers:
        - name: frontend
          image: ghcr.io/sindio/sindio-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:0.11
          args:
            - -nginx.scrape-uri=http://localhost:80/health
          ports:
            - name: metrics
              containerPort: 9113
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
---
# ── sindio-celery-beat (single-replica scheduler) ────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sindio-celery-beat
  namespace: sindio
  labels:
    app.kubernetes.io/name: sindio
    app.kubernetes.io/component: scheduler
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sindio-celery-beat
  template:
    metadata:
      labels:
        app: sindio-celery-beat
        app.kubernetes.io/name: sindio
        app.kubernetes.io/component: scheduler
    spec:
      serviceAccountName: sindio-backend
      containers:
        - name: beat
          image: ghcr.io/sindio/sindio-simulator:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - app.services.alert_scheduler
            - beat
            - --loglevel=info
          envFrom:
            - configMapRef:
                name: sindio-config
            - secretRef:
                name: sindio-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
