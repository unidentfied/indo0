# ============================================================
# Sindio — Deployments (all services)
# ============================================================

---
# ── sindio-api (Go gateway, 3 replicas) ─────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sindio-api
  namespace: sindio
  labels:
    app.kubernetes.io/name: sindio
    app.kubernetes.io/component: api-gateway
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sindio-api
  template:
    metadata:
      labels:
        app: sindio-api
        app.kubernetes.io/name: sindio
        app.kubernetes.io/component: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: sindio-backend
      containers:
        - name: api
          image: ghcr.io/sindio/sindio-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: sindio-config
            - secretRef:
                name: sindio-secrets
          env:
            - name: API_PORT
              value: "8080"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
# ── sindio-simulator (Python — simulation worker, queue-driven) ─
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sindio-simulator
  namespace: sindio
  labels:
    app.kubernetes.io/name: sindio
    app.kubernetes.io/component: simulator
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sindio-simulator
  template:
    metadata:
      labels:
        app: sindio-simulator
        app.kubernetes.io/name: sindio
        app.kubernetes.io/component: simulator
        version: stable
    spec:
      terminationGracePeriodSeconds: 300
      serviceAccountName: sindio-backend
      containers:
        - name: simulator
          image: ghcr.io/sindio/sindio-simulator:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - app.services.inference_queue
            - worker
            - --concurrency=2
            - --loglevel=info
            - --max-tasks-per-child=10
            - --time-limit=600
            - -Q
            - sindio_simulator
          envFrom:
            - configMapRef:
                name: sindio-config
            - secretRef:
                name: sindio-secrets
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          volumeMounts:
            - name: models
              mountPath: /app/models
              readOnly: true
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - app.services.inference_queue
                - inspect
                - ping
                - -d
                - celery@$(hostname)
            initialDelaySeconds: 120
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: sindio-models
            readOnly: true
---
# ── sindio-rag (Python — hybrid search + agentic workflow) ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sindio-rag
  namespace: sindio
  labels:
    app.kubernetes.io/name: sindio
    app.kubernetes.io/component: rag
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sindio-rag
  template:
    metadata:
      labels:
        app: sindio-rag
        app.kubernetes.io/name: sindio
        app.kubernetes.io/component: rag
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 120
      serviceAccountName: sindio-backend
      containers:
        - name: rag
          image: ghcr.io/sindio/sindio-rag:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          envFrom:
            - configMapRef:
                name: sindio-config
            - secretRef:
                name: sindio-secrets
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
          volumeMounts:
            - name: models
              mountPath: /app/models
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: sindio-models
            readOnly: true
---
# ── sindio-frontend (Nginx + React, 2 replicas) ─────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sindio-frontend
  namespace: sindio
  labels:
    app.kubernetes.io/name: sindio
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sindio-frontend
  template:
    metadata:
      labels:
        app: sindio-frontend
        app.kubernetes.io/name: sindio
        app.kubernetes.io/component: frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9113"
    spec:
      serviceAccountName: sindio-backend
      containers:
        - name: frontend
          image: ghcr.io/sindio/sindio-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:0.11
          args:
            - -nginx.scrape-uri=http://localhost:80/health
          ports:
            - name: metrics
              containerPort: 9113
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
---
# ── sindio-celery-beat (single-replica scheduler) ────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sindio-celery-beat
  namespace: sindio
  labels:
    app.kubernetes.io/name: sindio
    app.kubernetes.io/component: scheduler
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sindio-celery-beat
  template:
    metadata:
      labels:
        app: sindio-celery-beat
        app.kubernetes.io/name: sindio
        app.kubernetes.io/component: scheduler
    spec:
      serviceAccountName: sindio-backend
      containers:
        - name: beat
          image: ghcr.io/sindio/sindio-simulator:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - app.services.alert_scheduler
            - beat
            - --loglevel=info
          envFrom:
            - configMapRef:
                name: sindio-config
            - secretRef:
                name: sindio-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
# ── sindio-postgres (single-replica; Dev only — Prod uses RDS) ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sindio-postgres
  namespace: sindio
  labels:
    app.kubernetes.io/name: sindio
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sindio-postgres
  template:
    metadata:
      labels:
        app: sindio-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: sindio-secrets
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: sindio-config
                  key: DB_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: sindio-config
                  key: DB_NAME
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "sindio_user"]
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: sindio-postgres-data
---
# ── sindio-redis (single-replica; Dev only — Prod uses ElastiCache) ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sindio-redis
  namespace: sindio
  labels:
    app.kubernetes.io/name: sindio
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sindio-redis
  template:
    metadata:
      labels:
        app: sindio-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - name: redis
              containerPort: 6379
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - "512mb"
            - --maxmemory-policy
            - allkeys-lru
          volumeMounts:
            - name: redisdata
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: redisdata
          persistentVolumeClaim:
            claimName: sindio-redis-data
---
# ── sindio-qdrant (single-replica; Dev only) ─────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sindio-qdrant
  namespace: sindio
  labels:
    app.kubernetes.io/name: sindio
    app.kubernetes.io/component: qdrant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sindio-qdrant
  template:
    metadata:
      labels:
        app: sindio-qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          ports:
            - name: http
              containerPort: 6333
            - name: grpc
              containerPort: 6334
          volumeMounts:
            - name: qdrantdata
              mountPath: /qdrant/storage
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            tcpSocket:
              port: 6333
            initialDelaySeconds: 20
            periodSeconds: 15
      volumes:
        - name: qdrantdata
          persistentVolumeClaim:
            claimName: sindio-qdrant-data
---
# ── sindio-minio (single-replica; Dev only) ──────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sindio-minio
  namespace: sindio
  labels:
    app.kubernetes.io/name: sindio
    app.kubernetes.io/component: minio
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sindio-minio
  template:
    metadata:
      labels:
        app: sindio-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          envFrom:
            - secretRef:
                name: sindio-secrets
          volumeMounts:
            - name: miniodata
              mountPath: /data
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 20
            periodSeconds: 15
      volumes:
        - name: miniodata
          persistentVolumeClaim:
            claimName: sindio-minio-data
