# ============================================================
# Sindio — Kubernetes Ingress (AWS ALB)
# ============================================================
# Certificate ARN is injected per-overlay (not hardcoded).
# See overlays/prod/kustomization.yaml for prod cert.
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sindio
  namespace: sindio
  labels:
    app.kubernetes.io/name: sindio
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /api/health
    alb.ingress.kubernetes.io/group.name: sindio
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: sindio-api
                port:
                  number: 8080
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: sindio-api
                port:
                  number: 8080
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: sindio-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sindio-frontend
                port:
                  number: 80
