# ============================================================
# Sindio — ConfigMap (non-secret environment variables)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: sindio-config
  namespace: sindio
  labels:
    app.kubernetes.io/name: sindio
data:
  # --- Database (RDS) ---
  DB_HOST: "sindio-prod.cglsa06827tn.us-east-1.rds.amazonaws.com"
  DB_PORT: "5432"
  DB_NAME: "sindio"
  DB_USER: "sindio_user"
  DB_POOL_MIN: "2"
  DB_POOL_MAX: "10"

  # --- Redis (ElastiCache) ---
  REDIS_HOST: "sindio-prod.elyxlj.0001.use1.cache.amazonaws.com"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  CELERY_BROKER_URL: "redis://sindio-prod.elyxlj.0001.use1.cache.amazonaws.com:6379/0"
  CELERY_RESULT_BACKEND: "redis://sindio-prod.elyxlj.0001.use1.cache.amazonaws.com:6379/1"

  # --- Qdrant (not deployed in prod Free Tier) ---
  QDRANT_HOST: ""
  QDRANT_PORT: "6333"
  QDRANT_COLLECTION: "sindio_embeddings"
  QDRANT_COLLECTION_CACHE: "sindio_inference_cache"
  QDRANT_COLLECTION_DOCS: "nairobi_planning_docs"

  # --- MinIO (not deployed in prod — use S3 instead) ---
  MINIO_HOST: ""
  MINIO_PORT: "9000"
  MINIO_CONSOLE_PORT: "9001"
  MINIO_IMAGERY_BUCKET: "sindio-satellite-imagery"
  MINIO_GIS_BUCKET: "sindio-gis-rasters"

  # --- Service endpoints ---
  API_PORT: "8080"
  CORE_PORT: "8081"
  STREAMING_PORT: "8082"
  FRONTEND_PORT: "3000"

  # --- CORS ---
  CORS_ORIGINS: "https://sindio.net,http://localhost:3000"

  # --- Model paths ---
  MODEL_PATH: "/app/models/trained"
  EMBEDDINGS_PATH: "/app/models/embeddings"
  VECTOR_STORE_PATH: "/app/data/vector_store"
  DOCUMENTS_DIR: "/app/data/documents"

  # --- Auth settings ---
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRY_HOURS: "24"

  # --- Azure AD ---
  AZURE_AD_TENANT_ID: ""

  # --- Logging ---
  LOG_LEVEL: "info"
  RUST_LOG: "sindio_streaming=info,tower_http=debug"

  # --- Celery worker ---
  CELERY_CONCURRENCY: "2"
  CELERY_TASK_ACKS_LATE: "true"
  CELERY_WORKER_PREFETCH_MULTIPLIER: "1"

  # --- Elasticsearch / OpenSearch (managed) ---
  ELASTICSEARCH_HOST: "https://vpc-sindio-prod-7mlbtdzuaf3y6gkxdot5wq43ym.us-east-1.es.amazonaws.com:443"
  ELASTICSEARCH_INDEX_ALERTS: "sindio_alerts"
  ES_CLIENT_TYPE: "opensearch"
  OPENSEARCH_ENDPOINT: "https://vpc-sindio-prod-7mlbtdzuaf3y6gkxdot5wq43ym.us-east-1.es.amazonaws.com:443"

  # --- RAG / Ingestion ---
  RAG_INGESTION_POLL_INTERVAL: "30"
  RAG_CHUNK_TOKENS: "500"
  RAG_CHUNK_OVERLAP: "50"
  RAG_EMBEDDING_MODEL: "BAAI/bge-large-en-v1.5"
  RAG_RERANK_MODEL: "cross-encoder/ms-marco-MiniLM-L-6-v2"

  # --- Simulation ---
  SIMULATION_MAX_CONCURRENT: "2"
  SIMULATION_TIMEOUT_SECONDS: "300"

  # --- AWS ---
  AWS_DEFAULT_REGION: "us-east-1"
  S3_MODELS_BUCKET: "sindio-prod-models"
  S3_SIMULATIONS_BUCKET: "sindio-prod-simulations"
