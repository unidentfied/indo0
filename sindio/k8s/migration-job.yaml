# ============================================================
# Sindio — Database Migration Job
# ============================================================
# Run this Job after every deploy that includes schema changes.
# It applies SQL migrations from backend/migrations/ using golang-migrate.
# Usage: kubectl apply -f k8s/migration-job.yaml
#        kubectl wait --for=condition=complete job/sindio-migrate --timeout=120s
# ============================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: sindio-migrate
  namespace: sindio
  labels:
    app.kubernetes.io/name: sindio
    app.kubernetes.io/component: migration
spec:
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: sindio-backend
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z sindio-postgres.sindio.svc.cluster.local 5432; do echo waiting for db...; sleep 2; done;']
      containers:
        - name: migrate
          image: migrate/migrate:v4.17
          command:
            - "migrate"
            - "-path"
            - "/migrations"
            - "-database"
            - "$(DATABASE_URL)"
            - "up"
          envFrom:
            - configMapRef:
                name: sindio-config
            - secretRef:
                name: sindio-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sindio-secrets
                  key: DATABASE_URL
          volumeMounts:
            - name: migrations
              mountPath: /migrations
              readOnly: true
      volumes:
        - name: migrations
          configMap:
            name: sindio-migrations
  backoffLimit: 3
