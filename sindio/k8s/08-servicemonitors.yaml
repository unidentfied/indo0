# ============================================================
# Sindio — Prometheus ServiceMonitors
# ============================================================
# Requires prometheus-operator installed:
#   helm install prometheus prometheus-community/kube-prometheus-stack
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sindio-api
  namespace: sindio
  labels:
    app.kubernetes.io/name: sindio
    app.kubernetes.io/component: api-gateway
    release: prometheus
spec:
  selector:
    matchLabels:
      app: sindio-api
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
---
