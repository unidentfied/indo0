# ============================================================
# Sindio — Kubernetes Ingress (NGINX or AWS ALB)
# ============================================================
# Exposes the frontend and API to the internet.
# Requires an Ingress Controller (nginx-ingress or AWS Load Balancer Controller).
# TLS is terminated at the Ingress layer.
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sindio
  namespace: sindio
  labels:
    app.kubernetes.io/name: sindio
  annotations:
    # nginx-ingress
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # AWS Load Balancer Controller (alternative)
    # alb.ingress.kubernetes.io/scheme: internet-facing
    # alb.ingress.kubernetes.io/target-type: ip
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:...
spec:
  ingressClassName: nginx  # or "alb" for AWS ALB
  tls:
    - hosts:
        - sindio.net
        - app.sindio.net
      secretName: sindio-tls
  rules:
    - host: sindio.net
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: sindio-api
                port:
                  number: 8080
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: sindio-api
                port:
                  number: 8080
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: sindio-api
                port:
                  number: 8080
    - host: app.sindio.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sindio-frontend
                port:
                  number: 80
