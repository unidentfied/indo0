[build]
  base = "sindio/frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_API_BASE_URL = "https://api.sindio.net"

[[redirects]]
  from = "/api/*"
  to = "https://api.sindio.net/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "https://api.sindio.net/health"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
