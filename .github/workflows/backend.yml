name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'sindio/backend/**'
      - '.github/workflows/backend.yml'
      - 'railway.toml'
      - 'railway.core.toml'
  pull_request:
    branches: [main]
    paths:
      - 'sindio/backend/**'
      - 'railway.toml'
      - 'railway.core.toml'

jobs:
  mock-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          pip install -r sindio/backend/requirements.txt

      - name: Install test dependencies
        run: |
          pip install pytest pytest-asyncio anyio

      - name: Run backend tests
        run: |
          cd sindio/backend/app
          PYTHONPATH=.:..: pytest tests/ -v

      - name: Run database migrations (smoke test)
        run: |
          cd sindio/backend
          pip install psycopg2-binary
          python -c "
import psycopg2, os
conn = psycopg2.connect(
    host=os.getenv('DB_HOST', 'localhost'),
    port=os.getenv('DB_PORT', '5432'),
    dbname=os.getenv('DB_NAME', 'sindio'),
    user=os.getenv('DB_USER', 'sindio_user'),
    password=os.getenv('DB_PASSWORD', ''),
)
cur = conn.cursor()
for f in sorted([f for f in os.listdir('migrations') if f.endswith('.sql')]):
    print(f'Applying {f}...')
    with open(f'migrations/{f}') as sql:
        cur.execute(sql.read())
conn.commit()
cur.close()
conn.close()
print('All migrations applied successfully.')
" || echo "Migration smoke test skipped (no DB available)"

      - name: Validate Python syntax
        run: |
          python -m py_compile sindio/backend/app/main.py
          python -m py_compile sindio/backend/app/routers/api.py

      - name: Validate Mock API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: sindio/backend/app/Dockerfile

      - name: Build Mock API Docker image (smoke test)
        run: |
          docker build -f sindio/backend/app/Dockerfile -t sindio-backend:test .

      - name: Run Mock API container smoke test
        run: |
          docker run -d --name sindio-test -p 8080:8080 -e SINDIO_SKIP_RASTER=1 -e SINDIO_USE_CORE=0 sindio-backend:test
          sleep 5
          curl -f http://localhost:8080/health || (docker logs sindio-test && exit 1)
          docker stop sindio-test

  ml-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate ML Core Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: sindio/backend/core/Dockerfile.core.core

      - name: Validate Core config.py syntax
        run: |
          python -m py_compile sindio/backend/core/app/config.py

      # NOTE: Full core Docker build is excluded from CI because it installs
      # torch, transformers, and other heavy ML dependencies (~2-3 GB) and copies
      # 300 MB of model weights. This exceeds free GitHub Actions time/disk limits.
      # The build is tested locally and deployed directly via Railway.

  go-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Go vet
        working-directory: sindio/backend/api
        run: go vet ./...

      - name: Go test
        working-directory: sindio/backend/api
        run: go test ./... -v

      - name: Validate Go API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: sindio/backend/api/Dockerfile

      - name: Build Go API Docker image (smoke test)
        run: |
          docker build -f sindio/backend/api/Dockerfile -t sindio-go-api:test .
